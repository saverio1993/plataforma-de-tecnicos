<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Ícono: chip con circuito -->
  <g transform="translate(8, 8)">
    <!-- Pins del chip -->
    <rect x="0"  y="8"  width="6" height="2" fill="#3B82F6"/>
    <rect x="0"  y="14" width="6" height="2" fill="#3B82F6"/>
    <rect x="0"  y="20" width="6" height="2" fill="#3B82F6"/>
    <rect x="0"  y="26" width="6" height="2" fill="#3B82F6"/>
    <rect x="38" y="8"  width="6" height="2" fill="#10B981"/>
    <rect x="38" y="14" width="6" height="2" fill="#10B981"/>
    <rect x="38" y="20" width="6" height="2" fill="#10B981"/>
    <rect x="38" y="26" width="6" height="2" fill="#10B981"/>
    <rect x="8"  y="0"  width="2" height="6" fill="#3B82F6"/>
    <rect x="14" y="0"  width="2" height="6" fill="#3B82F6"/>
    <rect x="20" y="0"  width="2" height="6" fill="#3B82F6"/>
    <rect x="26" y="0"  width="2" height="6" fill="#3B82F6"/>
    <rect x="8"  y="38" width="2" height="6" fill="#10B981"/>
    <rect x="14" y="38" width="2" height="6" fill="#10B981"/>
    <rect x="20" y="38" width="2" height="6" fill="#10B981"/>
    <rect x="26" y="38" width="2" height="6" fill="#10B981"/>

    <!-- Cuerpo del chip -->
    <rect x="8" y="8" width="28" height="28" rx="3" fill="url(#logoGrad)" opacity="0.9"/>
    <rect x="8" y="8" width="28" height="28" rx="3" fill="none" stroke="#0F172A" stroke-width="1.5"/>

    <!-- Núcleo (JR) -->
    <text x="22" y="27" font-family="Inter, sans-serif" font-size="11" font-weight="900"
          fill="white" text-anchor="middle" letter-spacing="-0.5">JR</text>

    <!-- Destello -->
    <circle cx="34" cy="10" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- Texto: ACADEMIA JOTA RUBIO -->
  <g transform="translate(60, 0)">
    <text x="0" y="26" font-family="Inter, sans-serif" font-size="16" font-weight="800"
          fill="#F8FAFC" letter-spacing="-0.5">ACADEMIA</text>
    <text x="0" y="46" font-family="Inter, sans-serif" font-size="13" font-weight="600"
          fill="url(#logoGrad)" letter-spacing="0.5">JOTA RUBIO</text>
  </g>
</svg>

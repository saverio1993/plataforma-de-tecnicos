<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Circuit pattern (decorative) -->
  <g stroke="url(#accentGrad)" stroke-width="1" fill="none" opacity="0.2">
    <path d="M 0 150 L 300 150 L 300 80 L 600 80"/>
    <path d="M 0 450 L 200 450 L 200 550 L 400 550"/>
    <path d="M 800 80 L 1000 80 L 1000 200 L 1200 200"/>
    <path d="M 700 450 L 900 450 L 900 600 L 1200 600"/>
    <circle cx="300" cy="150" r="4" fill="#3B82F6"/>
    <circle cx="600" cy="80" r="4" fill="#10B981"/>
    <circle cx="200" cy="450" r="4" fill="#F59E0B"/>
    <circle cx="1000" cy="80" r="4" fill="#3B82F6"/>
  </g>

  <!-- Logo (chip) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="80" height="80" rx="14" fill="#0F172A" stroke="url(#accentGrad)" stroke-width="2"/>
    <rect x="14" y="14" width="52" height="52" rx="8" fill="url(#accentGrad)"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">JR</text>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#F8FAFC">ACADEMIA</text>
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="url(#accentGrad)">JOTA RUBIO</text>

  <!-- Tagline -->
  <text x="80" y="380" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#F8FAFC" letter-spacing="-2">La plataforma donde los</text>
  <text x="80" y="450" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="url(#accentGrad)" letter-spacing="-2">técnicos se vuelven leyenda</text>

  <!-- Bottom info -->
  <text x="80" y="560" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#94A3B8">2,438 técnicos · 120+ cursos · 850h de contenido</text>

  <!-- Accent bar bottom -->
  <rect x="80" y="600" width="200" height="4" fill="url(#accentGrad)" rx="2"/>
</svg>
